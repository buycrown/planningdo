<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harry's Lab — buycrown.cloud</title>
<meta name="description" content="Harry의 이커머스 서비스기획 연구소. 프로젝트 · 프로토타입 게이트웨이.">
<style>
  /* ============================================================
     buycrown.cloud — Harry's Lab (메인 게이트 페이지)
     AWS Summit 강의목록 UI 오마주 · 다크 워크스페이스 컨셉
     ============================================================ */
  :root{
    --bg:#070a12;
    --bg-soft:#0d1220;
    --card:#121829;
    --card-hover:#161d31;
    --border:#222a3d;
    --border-soft:#1a2133;
    --text:#eef2fb;
    --text-dim:#aab3c8;
    --text-mute:#6b768f;
    --accent:#a855f7;
    --accent2:#38bdf8;
    --accent3:#ff5ea3;
    --radius:18px;
    --maxw:1180px;
    font-synthesis:none;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',-apple-system,BlinkMacSystemFont,sans-serif;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }
  /* ambient lab glow */
  body::before,body::after{
    content:"";position:fixed;border-radius:50%;filter:blur(120px);z-index:0;opacity:.5;pointer-events:none;
  }
  body::before{width:520px;height:520px;background:radial-gradient(circle,#7c3aed55,transparent 70%);top:-160px;left:-120px;}
  body::after{width:560px;height:560px;background:radial-gradient(circle,#0ea5e944,transparent 70%);bottom:-220px;right:-160px;}
  .grain{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.035;
    background-image:radial-gradient(#fff 1px,transparent 1px);background-size:3px 3px;}

  .wrap{position:relative;z-index:1;max-width:var(--maxw);margin:0 auto;padding:0 28px 80px;}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:26px 0 10px;}
  .brand{display:flex;align-items:center;gap:14px;}
  .brand .ava{width:54px;height:54px;border-radius:50%;flex:0 0 auto;
    box-shadow:0 0 0 1px #2a3350,0 8px 26px #00000066;}
  .brand .who .kicker{font-size:11px;letter-spacing:3px;color:var(--accent2);font-weight:700;text-transform:uppercase;}
  .brand .who .name{font-size:20px;font-weight:800;letter-spacing:.3px;
    background:linear-gradient(90deg,#fff,#cbd5ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .toplinks{display:flex;gap:10px;align-items:center;}
  .toplinks a{font-size:12.5px;color:var(--text-dim);text-decoration:none;border:1px solid var(--border);
    padding:9px 14px;border-radius:999px;transition:.18s;background:#0e1424aa;backdrop-filter:blur(6px);}
  .toplinks a:hover{color:#fff;border-color:#3a4566;background:#151c30;}
  .toplinks .dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:7px;
    box-shadow:0 0 8px #22c55e;vertical-align:middle;}

  /* ---------- hero heading ---------- */
  .hero{padding:30px 0 8px;}
  .hero h1{font-size:clamp(30px,5vw,46px);font-weight:800;line-height:1.1;letter-spacing:-.5px;}
  .hero h1 .accent{background:linear-gradient(100deg,var(--accent3),var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .hero p{margin-top:14px;color:var(--text-dim);font-size:15px;max-width:640px;line-height:1.6;}

  /* ---------- controls ---------- */
  .controls{display:flex;gap:14px;align-items:center;margin:30px 0 18px;flex-wrap:wrap;}
  .filters{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{font-size:13px;color:var(--text-dim);border:1px solid var(--border);background:#0e1424;
    padding:9px 16px;border-radius:999px;cursor:pointer;transition:.16s;display:flex;align-items:center;gap:7px;}
  .chip:hover{border-color:#3a4566;color:#fff;}
  .chip.active{background:linear-gradient(90deg,#7c3aed,#2563eb);border-color:transparent;color:#fff;font-weight:600;
    box-shadow:0 6px 18px #5b21b655;}
  .search{flex:1;min-width:240px;display:flex;align-items:center;gap:10px;border:1px solid var(--border);
    background:#0b1120cc;border-radius:14px;padding:12px 16px;transition:.16s;}
  .search:focus-within{border-color:#445188;box-shadow:0 0 0 3px #6d28d933;}
  .search svg{flex:0 0 auto;opacity:.6}
  .search input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px;}
  .search input::placeholder{color:var(--text-mute);}

  .count{font-size:12.5px;color:var(--text-mute);margin:4px 2px 20px;letter-spacing:.3px;}
  .count b{color:var(--text-dim);}

  /* ---------- grid ---------- */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
  @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:600px){.grid{grid-template-columns:1fr;}}

  .card{position:relative;background:var(--card);border:1px solid var(--border-soft);border-radius:var(--radius);
    overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;
    transition:transform .2s ease,border-color .2s,box-shadow .2s;isolation:isolate;}
  .card:hover{transform:translateY(-6px);border-color:#33406a;box-shadow:0 18px 40px #00000077;}

  /* featured glow border */
  .card.featured{border-color:transparent;}
  .card.featured::before{content:"";position:absolute;inset:0;border-radius:var(--radius);padding:1.5px;z-index:-1;
    background:linear-gradient(130deg,var(--accent3),var(--accent),var(--accent2),#f59e0b);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;}
  .card.featured::after{content:"";position:absolute;inset:-40%;z-index:-2;opacity:.35;
    background:radial-gradient(circle at 30% 0%,#ff5ea366,transparent 55%);}

  .thumb{position:relative;aspect-ratio:16/10;overflow:hidden;background:#0a0e18;border-bottom:1px solid var(--border-soft);}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s ease;}
  .card:hover .thumb img{transform:scale(1.04);}
  .thumb .ribbon{position:absolute;top:12px;left:12px;font-size:10.5px;font-weight:700;letter-spacing:.5px;
    padding:5px 10px;border-radius:8px;background:#0b1120cc;backdrop-filter:blur(6px);color:#fff;
    border:1px solid #ffffff22;display:flex;align-items:center;gap:6px;}

  .body{padding:16px 18px 18px;display:flex;flex-direction:column;gap:10px;flex:1;}
  .meta-line{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .tag{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:5px;}
  .tag .ic{opacity:.85}
  .sep{width:3px;height:3px;border-radius:50%;background:var(--text-mute);}
  .title{font-size:16.5px;font-weight:700;line-height:1.35;color:#fff;}
  .code{font-size:12px;color:var(--text-mute);font-family:'Consolas',monospace;}
  .desc{font-size:13px;color:var(--text-dim);line-height:1.6;}
  .foot{margin-top:auto;display:flex;align-items:center;justify-content:space-between;padding-top:6px;}
  .go{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#fff;}
  .go .arr{transition:transform .2s;}
  .card:hover .go .arr{transform:translateX(5px);}
  .plus{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);display:grid;place-items:center;
    color:var(--text-dim);transition:.18s;background:#0e1424;}
  .card:hover .plus{background:#fff;color:#0a0e18;border-color:#fff;}

  /* empty state */
  .empty{grid-column:1/-1;text-align:center;color:var(--text-mute);padding:60px 0;font-size:14px;}

  footer{margin-top:60px;border-top:1px solid var(--border-soft);padding-top:24px;
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;color:var(--text-mute);font-size:12px;}
  footer .logo{font-weight:700;color:var(--text-dim);letter-spacing:.5px;}
</style>
</head>
<body>
<div class="grain"></div>
<div class="wrap">

  <!-- ===== TOP BAR ===== -->
  <header class="topbar">
    <div class="brand">
      <img class="ava" src="assets/avatar.svg" alt="Harry avatar">
      <div class="who">
        <div class="kicker">Harry's Lab</div>
        <div class="name">buycrown.cloud</div>
      </div>
    </div>
    <nav class="toplinks">
      <a href="https://www.lfmall.co.kr" target="_blank" rel="noopener"><span class="dot"></span>LFmall</a>
      <a href="https://wiki.lfcorp.com" target="_blank" rel="noopener">사내 위키 ↗</a>
    </nav>
  </header>

  <!-- ===== HERO ===== -->
  <section class="hero">
    <h1>프로젝트 &amp; <span class="accent">프로토타입</span></h1>
    <p>이커머스 서비스기획자 Harry의 연구소입니다. 여기서 진행한 모든 작업은
       하나의 웹페이지로 만들어 이 곳에 게시됩니다. 아래 카드를 눌러 각 프로젝트로 이동하세요.</p>
  </section>

  <!-- ===== CONTROLS ===== -->
  <div class="controls">
    <div class="filters" id="filters"><!-- chips injected --></div>
    <label class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8b95ad" stroke-width="2">
        <circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="search" type="text" placeholder="프로젝트 검색 (제목 · 설명 · 코드)…" autocomplete="off">
    </label>
  </div>

  <div class="count" id="count"></div>

  <!-- ===== GRID ===== -->
  <main class="grid" id="grid"></main>

  <footer>
    <span class="logo">🔬 Harry's Lab · buycrown.cloud</span>
    <span>이커머스 서비스기획 · Prototypes &amp; Tools · 2026</span>
  </footer>
</div>

<script>
/* ====================================================================
   ⭐ 콘텐츠 추가/수정은 여기만 고치면 됩니다 (PAGES 배열)
   --------------------------------------------------------------------
   새 프로젝트 추가 방법:
   1) 아래 PAGES 배열에 { } 블록을 하나 복사해서 붙여넣기
   2) 값만 바꾸기 (제목 / 경로 / 설명 등)
   3) 썸네일 이미지는 assets/ 폴더에 넣고 thumb 경로만 적기
      (png/jpg/svg 모두 가능. 실제 화면 캡쳐로 교체 권장)
   * featured:true 를 주면 무지개 테두리로 강조됩니다 (1개 권장)
   ==================================================================== */
const PAGES = [
  {
    title: "LFmall Open API",
    subtitle: "Developers Page",
    code: "LFAPI",
    date: "외부 연동 명세서 V6.9",
    url: "https://buycrown.cloud/lfapi",
    thumb: "assets/thumb-lfapi.svg",
    lang: "Korean",
    host: "LFmall B2B",
    level: "Production",
    category: "개발",
    badge: "API DOCS",
    desc: "입점업체용 외부 연동 Open API 명세서. 상품·주문·배송·코드 조회 등 전 도메인 엔드포인트와 인증 규칙을 한 곳에서 제공합니다.",
    featured: true
  },
  {
    title: "기획전 온톨로지 분석 툴",
    subtitle: "Prototype v2",
    code: "PLANON",
    date: "AI 분석 · 온톨로지 유사도",
    url: "https://buycrown.cloud/planon",
    thumb: "assets/thumb-planon.svg",
    lang: "Korean",
    host: "기획 · 데이터",
    level: "Prototype",
    category: "분석",
    badge: "ANALYTICS",
    desc: "기획전 속성 DB에 AI 추상 키워드와 온톨로지 유사도를 결합한 분석 프로토타입. 자연어 검색으로 유사 기획전을 탐색합니다.",
    featured: false
  },
  {
    title: "우리카드 제휴 포인트 행사",
    subtitle: "Service Flow",
    code: "WOORIPROMO",
    date: "Strategic Partnership 2026",
    url: "https://buycrown.cloud/wooripromo",
    thumb: "assets/thumb-wooripromo.svg",
    lang: "Korean",
    host: "LFmall × 우리카드",
    level: "기획안",
    category: "프로모션",
    badge: "PROMOTION",
    desc: "난수코드 기반 회원 식별과 행동 기반 포인트 적립을 설계한 제휴 행사 서비스 플로우. 월 정산 프로세스까지 포함합니다.",
    featured: false
  },
  {
    title: "토스 라스트클릭 쿠폰 로직",
    subtitle: "기획안 v1.0",
    code: "TOSSLASTCLICK",
    date: "마케팅실 요청 과제",
    url: "https://buycrown.cloud/tosslastclick",
    thumb: "assets/thumb-tosslastclick.svg",
    lang: "Korean",
    host: "LFmall × 토스페이",
    level: "기획안",
    category: "프로모션",
    badge: "COUPON",
    desc: "프로모션 URL 경유 유입 고객에게만 쿠폰을 적용하는 traceID·MID 분기 구조 기획안. Last Click 어트리뷰션 기반 설계입니다.",
    featured: false
  }
  /* ── ⬇️ 새 프로젝트는 위 블록을 복사해 여기에 추가하세요 ──
  ,{
    title: "프로젝트 제목",
    subtitle: "부제",
    code: "URLPATH",
    date: "날짜 / 버전",
    url: "https://buycrown.cloud/새경로",
    thumb: "assets/thumb-새경로.png",
    lang: "Korean", host: "팀/제휴", level: "Prototype",
    category: "분석", badge: "TAG",
    desc: "한 줄 설명을 적어주세요.",
    featured: false
  }
  */
];

/* ---------- 아이콘 ---------- */
const ICON = {
  lang:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>',
  host:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l8 4v5c0 5-3.5 7.5-8 9-4.5-1.5-8-4-8-9V7z"/></svg>',
  level:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10L12 4 2 10l10 6 10-6z"/><path d="M6 12v5c0 1 3 2.5 6 2.5S18 18 18 17v-5"/></svg>'
};

/* ---------- 렌더링 ---------- */
const grid = document.getElementById('grid');
const filtersEl = document.getElementById('filters');
const countEl = document.getElementById('count');
const searchEl = document.getElementById('search');
let activeCat = "전체";
let query = "";

function cardHTML(p){
  return `<a class="card ${p.featured?'featured':''}" href="${p.url}" target="_blank" rel="noopener">
    <div class="thumb">
      <img src="${p.thumb}" alt="${p.title} 미리보기" loading="lazy"
           onerror="this.style.display='none';this.parentElement.style.background='linear-gradient(135deg,#1b2340,#0c1120)'">
      ${p.badge?`<span class="ribbon">⌗ ${p.badge}</span>`:''}
    </div>
    <div class="body">
      <div class="meta-line">
        <span class="tag"><span class="ic">${ICON.lang}</span>${p.lang}</span>
        <span class="sep"></span>
        <span class="tag"><span class="ic">${ICON.host}</span>${p.host}</span>
        <span class="sep"></span>
        <span class="tag"><span class="ic">${ICON.level}</span>${p.level}</span>
      </div>
      <div class="title">${p.title}</div>
      <div class="code">${p.code} · ${p.date}</div>
      <div class="desc">${p.desc}</div>
      <div class="foot">
        <span class="go">바로가기 <span class="arr">→</span></span>
        <span class="plus">＋</span>
      </div>
    </div>
  </a>`;
}

function render(){
  const q = query.trim().toLowerCase();
  const list = PAGES.filter(p=>{
    const catOK = activeCat==="전체" || p.category===activeCat;
    const text = (p.title+p.desc+p.code+p.host+p.badge).toLowerCase();
    const qOK = !q || text.includes(q);
    return catOK && qOK;
  });
  grid.innerHTML = list.length
    ? list.map(cardHTML).join('')
    : `<div class="empty">🔍 조건에 맞는 프로젝트가 없어요. 다른 키워드로 검색해 보세요.</div>`;
  countEl.innerHTML = `<b>${list.length}</b> / 총 ${PAGES.length}개 프로젝트 표시`;
}

/* 필터칩 생성 (카테고리 자동 수집) */
function buildFilters(){
  const cats = ["전체", ...Array.from(new Set(PAGES.map(p=>p.category)))];
  filtersEl.innerHTML = cats.map((c,i)=>
    `<button class="chip ${i===0?'active':''}" data-cat="${c}">${i===0?'⚗️ ':''}${c}</button>`
  ).join('');
  filtersEl.querySelectorAll('.chip').forEach(b=>{
    b.onclick=()=>{
      filtersEl.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      activeCat=b.dataset.cat;
      render();
    };
  });
}

searchEl.addEventListener('input', e=>{ query=e.target.value; render(); });

buildFilters();
render();
</script>
</body>
</html>
